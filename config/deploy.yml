# Subly — Telegram subtitle-translation bot, deployed to a single VM with Kamal 2.
#
# This file holds COMMITTED DEFAULTS — no real hosts, no secrets. Your real
# per-environment values live in config/deploy.production.yml, which is
# GITIGNORED. Create it from the example and deploy with a destination:
#
#     cp config/deploy.production.yml.example config/deploy.production.yml
#     # fill in your host, then:
#     kamal deploy -d production
#
# The bot uses Telegram long polling (bot.py -> app.run_polling), so it has NO
# inbound HTTP surface: the role runs with `proxy: false` (no kamal-proxy, no
# HTTP health check) — Kamal just keeps the container running. It only needs
# outbound access to Telegram + the LLM endpoint.

service: subly
image: zakariaf/subly

# Single role, named `bot`. Kamal's primary role defaults to `web`, so point it here.
primary_role: bot

servers:
  bot:
    # Placeholder default — the real host is set in config/deploy.production.yml.
    # Deploying without `-d production` will (intentionally) fail against this.
    hosts:
      - &host REPLACE_IN_DEPLOY_PRODUCTION_YML
    proxy: false
    cmd: python bot.py

# Non-root user provisioned on the host with docker access.
ssh:
  user: deployer

# Convenience aliases: `kamal <alias> -d production`. shell -> a bash shell in the
# running container; console -> a Python REPL; logs -> tail the bot's logs.
aliases:
  shell: app exec --interactive --reuse "bash"
  console: app exec --interactive --reuse "python"
  logs: app logs -f

registry:
  # Docker Hub. KAMAL_REGISTRY_PASSWORD is a Docker Hub access token (.kamal/secrets).
  username: zakariaf
  password:
    - KAMAL_REGISTRY_PASSWORD

# Build amd64 so an Apple Silicon dev box cross-compiles instead of shipping an
# arm64 image an x86_64 host can't run. Change to arm64 if your server is ARM.
# No registry build cache: Docker Hub rejects the cache blob upload (400). The local
# buildx builder still caches layers between rebuilds, so this only drops cross-machine
# cache sharing. (Switch to `remote: ssh://deployer@HOST` to build on the server.)
builder:
  arch: amd64

env:
  clear:
    PYTHONUNBUFFERED: "1"
    # Transcription runs locally on CPU by default (no GPU). Set to "openai" to
    # offload to the OpenAI Whisper API (then OPENAI_API_KEY is required).
    TRANSCRIBE_BACKEND: local
    WHISPER_MODEL: small          # tiny | base | small | medium | large-v3
    # Translation LLM — any OpenAI-compatible endpoint:
    #   OpenAI:   https://api.openai.com/v1  + gpt-4o-mini
    #   DeepSeek: https://api.deepseek.com   + deepseek-chat
    #   Gemini:   https://generativelanguage.googleapis.com/v1beta/openai/  + gemini-2.5-flash
    LLM_BASE_URL: https://api.deepseek.com
    TRANSLATION_MODEL: deepseek-v4-pro
    TRANSLATION_BATCH_SIZE: "500"  # segments per LLM request;
    # Other tunables fall back to subtrans/config.py defaults (see .env.example).
    #
    # Big files: route through the local Bot API server accessory below (lifts the
    # 20/50 MB caps). Remove these four lines + the accessory to use the cloud API.
    TELEGRAM_API_BASE: http://subly-telegram-bot-api:8081
    TELEGRAM_LOCAL_MODE: "1"
    MAX_FILE_MB: "100"
    SEND_LIMIT_MB: "100"
  secret:
    - TELEGRAM_BOT_TOKEN
    - LLM_API_KEY                 # translation provider key (OpenAI, DeepSeek, ...)
    # - OPENAI_API_KEY            # also required if TRANSCRIBE_BACKEND=openai

# faster-whisper model cache (persisted across deploys); the second volume is
# shared with the bot-api accessory so the bot can read the big files it downloads.
volumes:
  - /opt/subly/whisper-cache:/root/.cache/huggingface
  - /opt/subly/tg-bot-api-data:/var/lib/telegram-bot-api

# Local Telegram Bot API server — lifts the 20 MB download / 50 MB upload caps
# (downloads unlimited, uploads up to 2 GB). Needs an api_id + api_hash from
# https://my.telegram.org, set as TELEGRAM_API_ID / TELEGRAM_API_HASH in
# .kamal/secrets. Remove this block (and the TELEGRAM_API_* env + shared volume
# above) to fall back to Telegram's cloud API.
accessories:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    host: *host
    env:
      clear:
        TELEGRAM_LOCAL: "1"
      secret:
        - TELEGRAM_API_ID
        - TELEGRAM_API_HASH
    volumes:
      - /opt/subly/tg-bot-api-data:/var/lib/telegram-bot-api

# One container, replaced on deploy. Per-chat settings live in memory and reset
# on restart (see README), so there's nothing to drain.
boot:
  limit: 1
  wait: 3
